# Common proxy headers - included in all service locations

# Strip upstream CORS headers — nginx sets its own, duplicates cause browser Network Error
proxy_hide_header Access-Control-Allow-Origin;
proxy_hide_header Access-Control-Allow-Credentials;
proxy_hide_header Access-Control-Allow-Methods;
proxy_hide_header Access-Control-Allow-Headers;
proxy_hide_header Access-Control-Max-Age;

# HTTP version
proxy_http_version 1.1;

# Pass original host
proxy_set_header Host $host;

# Pass real client IP
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Pass auth headers (JWT extracted by services)
proxy_set_header Authorization $http_authorization;

# Pass any custom headers
proxy_set_header X-User-Id $http_x_user_id;
proxy_set_header X-Username $http_x_username;

# Keepalive
proxy_set_header Connection "";

# Buffer settings
proxy_buffering on;
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 256k;