upstream user_service_cluster {
    least_conn; 
    server user-service-1:3001 max_fails=3 fail_timeout=30s;
    server user-service-2:3001 max_fails=3 fail_timeout=30s;
    server user-service-3:3001 max_fails=3 fail_timeout=30s;
}

upstream feed_service_cluster {
    least_conn;
    server feed-service-1:3004 max_fails=3 fail_timeout=30s;
    server feed-service-2:3004 max_fails=3 fail_timeout=30s;
    server feed-service-3:3004 max_fails=3 fail_timeout=30s;
    server feed-service-4:3004 max_fails=3 fail_timeout=30s;
    server feed-service-5:3004 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;

    location /api/v1/users {
        proxy_pass http://user_service_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/v1/feed {
        proxy_pass http://feed_service_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }
}