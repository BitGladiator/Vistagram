services:
  postgres-shard-1:
    image: postgres:14
    environment:
      POSTGRES_USER: vistagram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vistagram_users_shard_1
    volumes:
      - postgres-shard-1-data:/var/lib/postgresql/data
    networks:
      - vistagram-network

  postgres-shard-2:
    image: postgres:14
    environment:
      POSTGRES_USER: vistagram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vistagram_users_shard_2
    volumes:
      - postgres-shard-2-data:/var/lib/postgresql/data
    networks:
      - vistagram-network

  postgres-shard-3:
    image: postgres:14
    environment:
      POSTGRES_USER: vistagram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vistagram_users_shard_3
    volumes:
      - postgres-shard-3-data:/var/lib/postgresql/data
    networks:
      - vistagram-network

volumes:
  postgres-shard-1-data:
  postgres-shard-2-data:
  postgres-shard-3-data: